<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>LinkPortal</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<header class="header">
  <div class="header-brand">
    <img id="portal-logo" class="portal-logo" src="icons/icon48.png" alt="" style="display:none">
    <svg id="default-icon" class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
    <span id="portal-title" class="portal-title">LinkPortal</span>
  </div>
  <div class="header-actions">
    <span id="cache-badge" class="cache-badge" style="display:none">📦</span>
    <button id="btn-refresh" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
    <div class="dropdown-wrap">
      <button id="btn-menu" class="icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="5" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="19" r="1.2" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <div id="dropdown-menu" class="dropdown-menu" style="display:none">
        <button class="dd-item" id="dd-open-portal"><span id="dd-lbl-portal">Portal öffnen</span></button>
        <button class="dd-item" id="dd-settings"><span id="dd-lbl-settings">Einstellungen</span></button>
        <div class="dd-divider"></div>
        <div class="dd-footer-row">
          <select id="dd-lang-sel" class="dd-lang-select">
            <option value="de">🇩🇪 Deutsch</option>
            <option value="en">🇬🇧 English</option>
            <option value="es">🇪🇸 Español</option>
          </select>
          <span class="dd-version" id="dd-version">v1.10.9</span>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Search: hidden when in settings -->
<div id="search-wrap" class="search-container">
  <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <input type="text" id="search-input" class="search-input">
  <button id="search-clear" class="search-clear" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<div id="content-area">

  <div id="screen-logout" class="screen" style="display:none">
    <div class="center-box">
      <div class="center-icon" id="logout-icon">🔒</div>
      <h2 class="center-title" id="logout-title"></h2>
      <p class="center-desc" id="logout-desc"></p>
      <button id="btn-logout-settings" class="btn btn-primary"></button>
    </div>
  </div>

  <div id="screen-setup" class="screen" style="display:none">
    <div class="center-box">
      <div class="center-icon" id="setup-icon">🔗</div>
      <h2 class="center-title" id="setup-title"></h2>
      <p class="center-desc" id="setup-desc"></p>
      <button id="btn-open-settings" class="btn btn-primary"></button>
    </div>
  </div>

  <div id="screen-loading" class="screen" style="display:none">
    <div class="center-box">
      <div class="spinner"></div>
      <span id="loading-text" class="loading-text"></span>
    </div>
  </div>

  <div id="screen-error" class="screen" style="display:none">
    <div class="center-box">
      <div class="center-icon" id="error-icon">⚠️</div>
      <h3 id="error-title" class="center-title" style="color:var(--danger)"></h3>
      <p id="error-message" class="center-desc"></p>
      <button id="btn-retry" class="btn btn-primary"></button>
    </div>
  </div>

  <div id="screen-main" class="screen" style="display:none">
    <!-- Tab bar: hamburger toggle + tabs label + add button -->
    <div class="tabs-bar" id="tabs-bar">
      <div class="tabs-toggle-wrap">
        <button id="tabs-toggle-btn" class="tabs-toggle-btn">
          <span id="tabs-burger" class="burger"><span></span><span></span><span></span></span>
          <span id="active-tab-label" class="active-tab-label"></span>
          <svg id="tabs-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <!-- Tab dropdown -->
        <div id="tabs-dropdown" class="tabs-dropdown" style="display:none"></div>
      </div>
      <button id="tab-add-btn" class="tab-add-btn" style="display:none">+ Link</button>
    </div>
    <div id="search-results" class="scroll-area" style="display:none">
      <div class="results-header" id="results-header"></div>
      <div id="results-list"></div>
    </div>
    <div id="tab-content" class="scroll-area"></div>
  </div>

  <!-- Settings panel -->
  <div id="screen-settings" class="screen settings-screen" style="display:none">
    <div class="settings-header">
      <button id="btn-settings-back" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span id="s-title-lbl" class="settings-title-lbl"></span>
    </div>
    <div class="settings-body">

      <div class="card">
        <div class="card-title" id="s-lbl-conn"></div>
        <div class="field">
          <label class="label" id="s-lbl-url" for="s-base-url"></label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <input type="url" id="s-base-url" class="input" spellcheck="false">
          </div>
          <span class="field-hint" id="s-hint-url"></span>
        </div>
        <div class="field">
          <label class="label" id="s-lbl-user" for="s-username"></label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="s-username" class="input" spellcheck="false">
          </div>
          <span class="field-hint" id="s-hint-user"></span>
        </div>
        <div class="field">
          <label class="label" id="s-lbl-token" for="s-api-token"></label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="s-api-token" class="input" spellcheck="false">
            <button id="s-btn-edit-tok" class="input-action token-edit-btn" style="display:none">✏️</button>
            <button id="s-btn-show-tok" class="input-action">
              <svg id="s-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field-hint" id="s-hint-token"></span>
        </div>
      </div>

      <div class="card">
        <div class="card-title" id="s-lbl-test-title"></div>
        <div id="s-test-result" class="test-result" style="display:none"></div>
        <button id="s-btn-test" class="btn btn-secondary btn-full"><span id="s-lbl-test-btn"></span></button>
      </div>

      <div class="card">
        <div class="card-title" id="s-lbl-sync-title"></div>
        <div class="sync-info-row">
          <div class="sync-info-item"><span class="sync-label" id="s-lbl-last-sync"></span><span id="s-sync-time" class="sync-value">—</span></div>
          <div class="sync-info-item"><span class="sync-label" id="s-lbl-auto"></span><span id="s-auto-val" class="sync-value"></span></div>
          <div class="sync-info-item"><span class="sync-label" id="s-lbl-cached"></span><span id="s-cache-cnt" class="sync-value">—</span></div>
        </div>
        <div id="s-sync-result" class="test-result" style="display:none"></div>
        <div class="btn-row">
          <button id="s-btn-sync" class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span id="s-lbl-sync-now"></span></button>
          <button id="s-btn-clear" class="btn btn-ghost"><span id="s-lbl-clear"></span></button>
        </div>
      </div>

      <div class="card">
        <div class="card-title" id="s-lbl-bm-title"></div>
        <label class="toggle-row">
          <div class="toggle-info">
            <span class="label" id="s-lbl-bm-label"></span>
            <span class="field-hint" id="s-lbl-bm-hint"></span>
          </div>
          <span class="toggle-switch">
            <input type="checkbox" id="s-bm-toggle">
            <span class="toggle-track"></span>
          </span>
        </label>
        <div class="field" id="s-bm-loc-row" style="margin-top:8px">
          <label class="label" id="s-lbl-bm-loc" for="s-bm-parent"></label>
          <select id="s-bm-parent" class="input input-select">
            <option value="other" id="s-bm-loc-other"></option>
            <option value="bar" id="s-bm-loc-bar"></option>
          </select>
          <button id="s-btn-bm-newfolder" class="btn btn-secondary" type="button" style="margin-top:6px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M12 5v14"/><path d="M5 12h14"/></svg><span id="s-lbl-bm-newfolder"></span></button>
        </div>
        <label class="toggle-row" style="margin-top:8px">
          <div class="toggle-info">
            <span class="label" id="s-lbl-bm-wrap"></span>
            <span class="field-hint" id="s-lbl-bm-wrap-hint"></span>
          </div>
          <span class="toggle-switch">
            <input type="checkbox" id="s-bm-wrap" checked>
            <span class="toggle-track"></span>
          </span>
        </label>
        <label class="toggle-row" style="margin-top:8px">
          <div class="toggle-info">
            <span class="label" id="s-lbl-bm-fav"></span>
            <span class="field-hint" id="s-lbl-bm-fav-hint"></span>
          </div>
          <span class="toggle-switch">
            <input type="checkbox" id="s-bm-fav">
            <span class="toggle-track"></span>
          </span>
        </label>
        <label class="toggle-row" style="margin-top:8px">
          <div class="toggle-info">
            <span class="label" id="s-lbl-bm-private"></span>
            <span class="field-hint" id="s-lbl-bm-private-hint"></span>
          </div>
          <span class="toggle-switch">
            <input type="checkbox" id="s-bm-private">
            <span class="toggle-track"></span>
          </span>
        </label>
        <button id="s-btn-bm-sync" class="btn btn-primary" style="margin-top:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span id="s-lbl-bm-sync-now"></span></button>
        <div id="s-bm-result" class="test-result" style="display:none"></div>
      </div>

      <div class="card">
        <div class="card-title" id="s-lbl-theme-title"></div>
        <div class="theme-row">
          <button class="theme-btn-lg" data-theme="light" id="s-theme-light">
            <span class="theme-btn-icon">☀️</span>
            <span id="s-lbl-theme-light">Hell</span>
          </button>
          <button class="theme-btn-lg" data-theme="auto" id="s-theme-auto">
            <span class="theme-btn-icon">🌗</span>
            <span id="s-lbl-theme-auto">Auto</span>
          </button>
          <button class="theme-btn-lg" data-theme="dark" id="s-theme-dark">
            <span class="theme-btn-icon">🌙</span>
            <span id="s-lbl-theme-dark">Dunkel</span>
          </button>
        </div>
      </div>

      <div class="card">
        <div class="card-title" id="s-lbl-starttab-title"></div>
        <div class="field">
          <label class="label" id="s-lbl-starttab-label" for="s-starttab"></label>
          <select id="s-starttab" class="input input-select">
            <option value="last" id="s-starttab-last"></option>
            <option value="first" id="s-starttab-first"></option>
            <option value="all" id="s-starttab-all"></option>
          </select>
          <span class="field-hint" id="s-lbl-starttab-hint"></span>
        </div>
      </div>

      <div class="card">
        <div class="card-title" id="s-lbl-lang-title"></div>
        <div class="field">
          <label class="label" id="s-lbl-lang-sel" for="s-lang"></label>
          <select id="s-lang" class="input input-select">
            <option value="de">🇩🇪 Deutsch</option>
            <option value="en">🇬🇧 English</option>
            <option value="es">🇪🇸 Español</option>
          </select>
          <span class="field-hint" id="s-hint-lang"></span>
        </div>
      </div>

    </div>
    <footer class="settings-footer">
      <button id="s-btn-reset" class="btn btn-ghost"><span id="s-lbl-reset"></span></button>
      <div class="footer-right">
        <div id="s-save-status" class="save-status"></div>
        <button id="s-btn-save" class="btn btn-primary" disabled><span id="s-lbl-save"></span></button>
      </div>
    </footer>
    <!-- Version + collapsible Extension ID below footer -->
    <div class="settings-version-bar">
      <button id="s-version-btn" class="settings-version-btn">v1.10.9</button>
      <div id="s-extid-collapse" class="extid-collapse" style="display:none">
        <div class="ext-id-row">
          <code id="s-ext-id" class="ext-id-code">…</code>
          <button id="s-btn-copy-id" class="btn-tiny">📋</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Link Dialog -->
<div id="dlg-backdrop" class="dlg-backdrop" style="display:none">
  <div class="dlg-box">
    <div class="dlg-header">
      <span id="dlg-title" class="dlg-title-text"></span>
      <button id="dlg-close" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="dlg-body">
      <input type="hidden" id="dlg-link-id">
      <div class="field">
        <div class="dlg-label-row">
          <label class="label" id="dlg-lbl-url" for="dlg-url"></label>
          <button id="dlg-btn-current" class="btn-tiny"></button>
        </div>
        <input type="url" id="dlg-url" class="input" spellcheck="false">
      </div>
      <div class="field">
        <label class="label" id="dlg-lbl-title" for="dlg-title-inp"></label>
        <input type="text" id="dlg-title-inp" class="input" spellcheck="false">
      </div>
      <div class="field">
        <label class="label" id="dlg-lbl-desc" for="dlg-desc"></label>
        <input type="text" id="dlg-desc" class="input" spellcheck="false">
      </div>
      <div class="field">
        <label class="label" id="dlg-lbl-logo" for="dlg-logo"></label>
        <input type="url" id="dlg-logo" class="input" spellcheck="false">
      </div>
      <div class="field" id="dlg-sec-field">
        <label class="label" id="dlg-lbl-sec" for="dlg-sec"></label>
        <select id="dlg-sec" class="input input-select"></select>
      </div>
      <div id="dlg-err" class="test-result error" style="display:none"></div>
    </div>
    <div class="dlg-footer">
      <button id="dlg-cancel" class="btn btn-ghost"><span id="dlg-lbl-cancel"></span></button>
      <button id="dlg-save" class="btn btn-primary"><span id="dlg-lbl-save"></span></button>
    </div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="icons.js"></script>
<script src="popup.js"></script>
</body>
</html>
